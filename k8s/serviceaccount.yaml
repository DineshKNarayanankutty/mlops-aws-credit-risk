# FIX C-02: ServiceAccount with IRSA annotation.
# The annotation wires this SA to the IAM role that grants S3 read access
# to the model artifacts bucket and ECR pull permissions.
# Replace ACCOUNT_ID and REGION with your values, or use envsubst in CI.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: inference-service
  namespace: inference
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::${ACCOUNT_ID}:role/${ENVIRONMENT}-mlops-inference-irsa-role
    eks.amazonaws.com/sts-regional-endpoints: "true"  # Use regional STS endpoint (faster + more resilient)
